<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Ocean Gradient -->
    <linearGradient id="abyssGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#013654" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background Plate -->
  <circle cx="50" cy="50" r="50" fill="#01080e" />

  <!-- Outer Ring (Surface) -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#abyssGrad)" stroke-width="2" opacity="0.5" />

  <!-- Middle Ring (Twilight) -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#00c5ff" stroke-width="1.5" opacity="0.3" />

  <!-- Inner Core (Abyss) -->
  <circle cx="50" cy="50" r="10" fill="#000000" />

  <!-- Descending Light (Bathysphere/Sub/Life) -->
  <circle cx="50" cy="75" r="3" fill="#39ff14" filter="url(#glow)" />
</svg>
